name: Deploy FrontEnd to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: .env
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" >> .env
          echo "VITE_USE_MOCK_AI=${{ secrets.VITE_USE_MOCK_AI }}" >> .env
          echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" >> .env
          echo "VITE_USE_GEMINI_AI=${{ secrets.VITE_USE_GEMINI_AI }}" >> .env
          echo "VITE_GROQ_API_KEY=${{ secrets.VITE_GROQ_API_KEY }}" >> .env
          echo "VITE_GROQ_MODEL=${{ secrets.VITE_GROQ_MODEL }}" >> .env

      - name: Build project
        run: npm run build

      - name: Check build output
        run: ls -la dist

      - name: Deploy To Server (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /home/edulandacademy/web/interno.blog/public_html/
